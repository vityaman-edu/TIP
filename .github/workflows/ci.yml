name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Format
        run: sbt scalafmtCheck

      - name: Lint
        run: sbt "scalafixAll --check"

      - name: Compile
        run: sbt compile
